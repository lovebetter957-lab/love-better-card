<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOVE BETTER 會員集點卡</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background:
        radial-gradient(circle at top, #f6ede6 0%, #f3eee9 35%, #eee8e2 100%);
      color: #2d2622;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .hero {
      background: linear-gradient(135deg, #2d2622 0%, #4c3a31 100%);
      color: #fff;
      border-radius: 28px;
      padding: 26px 22px;
      box-shadow: 0 14px 35px rgba(60, 44, 34, 0.22);
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -30px;
      top: -30px;
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }

    .hero-title {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .hero-subtitle {
      font-size: 14px;
      line-height: 1.7;
      color: rgba(255,255,255,0.85);
      position: relative;
      z-index: 1;
    }

    .card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 28px rgba(70, 52, 42, 0.08);
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.6);
    }

    .title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 8px;
      color: #2d2622;
    }

    .subtitle {
      color: #7a6f67;
      line-height: 1.7;
      font-size: 14px;
      word-break: break-word;
    }

    .section-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 12px;
      color: #2d2622;
    }

    .input-label {
      font-size: 13px;
      font-weight: 800;
      color: #5f544d;
      margin-top: 10px;
      margin-bottom: 6px;
    }

    input, select, textarea, button {
      width: 100%;
      font-size: 16px;
      border-radius: 16px;
      border: 1px solid #e5ddd7;
      padding: 14px 14px;
      outline: none;
      background: #fff;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #a88572;
      box-shadow: 0 0 0 4px rgba(168,133,114,0.12);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    .birthday-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    .btn {
      border: none;
      cursor: pointer;
      font-weight: 900;
      letter-spacing: 0.3px;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #2d2622 0%, #46352c 100%);
      color: #fff;
      padding: 15px 16px;
      margin-top: 14px;
      box-shadow: 0 8px 18px rgba(45, 38, 34, 0.18);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #a1745c 0%, #8e624c 100%);
      color: #fff;
      padding: 14px 16px;
    }

    .btn-light {
      background: #f4efea;
      color: #2d2622;
      border: 1px solid #e6ddd6;
      padding: 14px 16px;
    }

    .hidden {
      display: none;
    }

    .progress-card {
      background: linear-gradient(180deg, #fff 0%, #fbf8f5 100%);
    }

    .progress-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .progress-number {
      font-size: 40px;
      font-weight: 900;
      color: #2d2622;
      line-height: 1;
    }

    .progress-hint {
      font-size: 13px;
      color: #8b7f77;
      line-height: 1.5;
      text-align: right;
    }

    .bar {
      background: #ece3dc;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .bar-inner {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #8f6650 0%, #2d2622 100%);
      width: 0%;
    }

    .member-meta {
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      background: #f7f2ee;
      color: #6b6059;
      font-size: 13px;
      line-height: 1.8;
    }

    .task-category {
      font-size: 17px;
      font-weight: 900;
      margin-top: 18px;
      margin-bottom: 10px;
      color: #2d2622;
    }

    .task {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      border-radius: 18px;
      background: #f7f3ef;
      margin: 8px 0;
      border: 1px solid #f0e8e2;
    }

    .task.done {
      background: #eef7ef;
      border-color: #d8ead9;
    }

    .task-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .task-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #e8ddd5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .task.done .task-icon {
      background: #63a167;
      color: #fff;
    }

    .task-name {
      font-size: 14px;
      line-height: 1.5;
      color: #2d2622;
      word-break: break-word;
    }

    .badge {
      flex-shrink: 0;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #ddd3cb;
      color: #5c524c;
      font-weight: 800;
      white-space: nowrap;
    }

    .task.done .badge {
      background: #2f7d32;
      color: #fff;
    }

    .small {
      font-size: 13px;
      color: #7a6f67;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 8px;
    }

    .error {
      color: #c32323;
      font-weight: 800;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .success {
      color: #198754;
      font-weight: 800;
      white-space: pre-wrap;
      word-break: break-word;
    }

    hr {
      border: none;
      border-top: 1px solid #eee4dd;
      margin: 18px 0;
    }

    @media (max-width: 480px) {
      .container {
        padding: 16px 12px 34px;
      }

      .hero {
        padding: 22px 18px;
        border-radius: 24px;
      }

      .hero-title {
        font-size: 28px;
      }

      .title {
        font-size: 22px;
      }

      .progress-number {
        font-size: 34px;
      }

      .progress-top {
        align-items: flex-start;
        flex-direction: column;
      }

      .progress-hint {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="hero-title">LOVE BETTER</div>
      <div class="hero-subtitle">
        完成 23 點任務即可獲得日本機票。<br>
        新的相遇 / 新的自己 / 新的可能
      </div>
    </div>

    <div id="loading" class="card">
      <div class="title">載入中</div>
      <div class="subtitle">正在讀取你的會員資料...</div>
    </div>

    <div id="registerView" class="card hidden">
      <div class="title">會員註冊</div>
      <div class="subtitle">
        完成會員建檔後，即可開始累積任務點數。
      </div>

      <div class="input-label">真實姓名</div>
      <input id="name" placeholder="請輸入姓名" />

      <div class="input-label">手機號碼</div>
      <input id="phone" placeholder="請輸入手機號碼" inputmode="tel" />

      <div class="input-label">出生年月日</div>
      <div class="birthday-grid">
        <select id="birthYear">
          <option value="">年份</option>
        </select>
        <select id="birthMonth">
          <option value="">月份</option>
        </select>
        <select id="birthDay">
          <option value="">日期</option>
        </select>
      </div>

      <div class="input-label">性別</div>
      <select id="gender">
        <option value="">請選擇性別</option>
        <option value="男">男</option>
        <option value="女">女</option>
      </select>

      <button class="btn btn-primary" onclick="submitRegister()">完成會員註冊</button>
      <div id="registerMsg" class="small"></div>
    </div>

    <div id="memberView" class="hidden"></div>

    <div class="card">
      <button class="btn btn-light" onclick="openStaffPanel()">工作人員模式</button>
      <div id="staffView" class="hidden"></div>
    </div>
  </div>

  <script>
    const LIFF_ID = "2010383114-PRFsKe7Y";

    let ACCESS_TOKEN = "";
    let MY_CARD = null;
    let STAFF_DATA = null;

    function setLoading(message) {
      document.getElementById("loading").innerHTML = `
        <div class="title">處理中</div>
        <div class="subtitle">${message}</div>
      `;
    }

    function showError(message) {
      document.getElementById("loading").innerHTML = `
        <div class="title">系統錯誤</div>
        <div class="error">${message}</div>
      `;
    }

    function pad2(num) {
      return String(num).padStart(2, "0");
    }

    function populateBirthdayOptions() {
      const yearSelect = document.getElementById("birthYear");
      const monthSelect = document.getElementById("birthMonth");
      const daySelect = document.getElementById("birthDay");

      const currentYear = new Date().getFullYear();

      for (let y = currentYear; y >= 1950; y--) {
        const option = document.createElement("option");
        option.value = y;
        option.textContent = y + "年";
        yearSelect.appendChild(option);
      }

      for (let m = 1; m <= 12; m++) {
        const option = document.createElement("option");
        option.value = pad2(m);
        option.textContent = m + "月";
        monthSelect.appendChild(option);
      }

      function renderDays() {
        daySelect.innerHTML = '<option value="">日期</option>';

        const year = parseInt(yearSelect.value, 10);
        const month = parseInt(monthSelect.value, 10);

        if (!year || !month) return;

        const lastDay = new Date(year, month, 0).getDate();

        for (let d = 1; d <= lastDay; d++) {
          const option = document.createElement("option");
          option.value = pad2(d);
          option.textContent = d + "日";
          daySelect.appendChild(option);
        }
      }

      yearSelect.addEventListener("change", renderDays);
      monthSelect.addEventListener("change", renderDays);
    }

    async function api(action, payload = {}) {
      const response = await fetch("/api/gas", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          action,
          accessToken: ACCESS_TOKEN,
          payload
        })
      });

      const result = await response.json();

      if (!result.ok) {
        throw new Error(result.error || "API 發生錯誤");
      }

      return result.data;
    }

    async function init() {
      try {
        populateBirthdayOptions();

        setLoading("1/3 正在初始化 LINE 會員身分...");

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          setLoading("尚未登入 LINE，正在導向登入...");
          liff.login();
          return;
        }

        ACCESS_TOKEN = liff.getAccessToken();

        if (!ACCESS_TOKEN) {
          throw new Error("抓不到 LINE Access Token");
        }

        setLoading("2/3 已取得 LINE 身分，讀取會員資料中...");

        MY_CARD = await api("getMyCard");

        document.getElementById("loading").classList.add("hidden");

        if (!MY_CARD.registered) {
          document.getElementById("registerView").classList.remove("hidden");
          return;
        }

        renderMemberCard(MY_CARD);
      } catch (error) {
        showError(error.message || error);
      }
    }

    async function submitRegister() {
      const msg = document.getElementById("registerMsg");
      msg.innerHTML = "送出中...";

      const year = document.getElementById("birthYear").value;
      const month = document.getElementById("birthMonth").value;
      const day = document.getElementById("birthDay").value;

      const form = {
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        birthday: year && month && day ? `${year}-${month}-${day}` : "",
        gender: document.getElementById("gender").value
      };

      if (!form.name || !form.phone || !form.gender) {
        msg.innerHTML = '<span class="error">姓名、手機、性別為必填欄位</span>';
        return;
      }

      try {
        MY_CARD = await api("registerMember", form);
        document.getElementById("registerView").classList.add("hidden");
        renderMemberCard(MY_CARD);
      } catch (error) {
        msg.innerHTML = `<span class="error">${error.message || error}</span>`;
      }
    }

    function renderMemberCard(data) {
      const view = document.getElementById("memberView");
      view.classList.remove("hidden");

      const percent = data.totalPoints > 0
        ? Math.min(100, Math.round((data.completedPoints / data.totalPoints) * 100))
        : 0;

      const grouped = {};
      data.tasks.forEach(task => {
        if (!grouped[task.category]) grouped[task.category] = [];
        grouped[task.category].push(task);
      });

      let taskHtml = "";

      Object.keys(grouped).forEach(category => {
        taskHtml += `<div class="task-category">${category}</div>`;

        grouped[category].forEach(task => {
          taskHtml += `
            <div class="task ${task.completed ? "done" : ""}">
              <div class="task-left">
                <div class="task-icon">${task.completed ? "✓" : "•"}</div>
                <div class="task-name">${task.taskName}</div>
              </div>
              <div class="badge">${task.completed ? "已完成" : "+ " + task.points}</div>
            </div>
          `;
        });
      });

      view.innerHTML = `
        <div class="card progress-card">
          <div class="title">LOVE BETTER 會員卡</div>
          <div class="subtitle">${data.member.name}，你的關係探索旅程進度如下。</div>

          <div class="progress-top">
            <div class="progress-number">${data.completedPoints} / ${data.totalPoints}</div>
            <div class="progress-hint">
              還差 ${data.remainingPoints} 點<br>
              完成日本機票資格
            </div>
          </div>

          <div class="bar">
            <div class="bar-inner" style="width:${percent}%"></div>
          </div>

          <div class="member-meta">
            會員編號：${data.member.memberId}<br>
            會員性別：${data.member.gender}<br>
            LINE 名稱：${data.profile.lineName || ""}
          </div>
        </div>

        <div class="card">
          <div class="section-title">任務完成狀態</div>
          ${taskHtml}
        </div>
      `;
    }

    async function openStaffPanel() {
      const staffView = document.getElementById("staffView");
      staffView.classList.remove("hidden");
      staffView.innerHTML = '<div class="small">工作人員資料讀取中...</div>';

      try {
        STAFF_DATA = await api("getStaffPanelData");
        renderStaffPanel();
      } catch (error) {
        staffView.innerHTML = `<div class="error">${error.message || error}</div>`;
      }
    }

    function renderStaffPanel() {
      const staffView = document.getElementById("staffView");

      const taskOptions = STAFF_DATA.tasks.map(task => {
        return `<option value="${task.taskId}">${task.gender}｜${task.category}｜${task.taskName}</option>`;
      }).join("");

      staffView.innerHTML = `
        <div class="title">工作人員發放任務</div>

        <div class="task-category">單一會員發放</div>
        <input id="singleMemberId" placeholder="輸入會員編號，例如 LOVE0001">
        <select id="singleTaskId">${taskOptions}</select>
        <textarea id="singleNote" placeholder="備註，例如 6/22 精選活動完成"></textarea>
        <button class="btn btn-secondary" onclick="grantSingle()">發放給單一會員</button>
        <div id="singleMsg" class="small"></div>

        <hr>

        <div class="task-category">集體發放</div>
        <select id="bulkMode">
          <option value="all">全部會員</option>
          <option value="gender">依性別發放</option>
          <option value="ids">貼上會員 ID 批量發放</option>
        </select>

        <select id="bulkGender">
          <option value="男">男</option>
          <option value="女">女</option>
        </select>

        <textarea id="bulkMemberIds" placeholder="若選擇貼上會員 ID，請輸入 LOVE0001、LOVE0002，可換行"></textarea>
        <select id="bulkTaskId">${taskOptions}</select>
        <textarea id="bulkNote" placeholder="備註，例如 6/22 活動集體完成"></textarea>
        <button class="btn btn-secondary" onclick="grantBulk()">集體發放</button>
        <div id="bulkMsg" class="small"></div>
      `;
    }

    async function grantSingle() {
      const msg = document.getElementById("singleMsg");
      msg.innerHTML = "發放中...";

      try {
        const result = await api("grantTaskToMember", {
          memberId: document.getElementById("singleMemberId").value.trim(),
          taskId: document.getElementById("singleTaskId").value,
          note: document.getElementById("singleNote").value.trim()
        });

        msg.innerHTML = `<span class="success">${result.message}</span>`;
      } catch (error) {
        msg.innerHTML = `<span class="error">${error.message || error}</span>`;
      }
    }

    async function grantBulk() {
      const msg = document.getElementById("bulkMsg");
      msg.innerHTML = "集體發放中...";

      try {
        const result = await api("bulkGrantTask", {
          mode: document.getElementById("bulkMode").value,
          gender: document.getElementById("bulkGender").value,
          memberIds: document.getElementById("bulkMemberIds").value,
          taskId: document.getElementById("bulkTaskId").value,
          note: document.getElementById("bulkNote").value.trim()
        });

        msg.innerHTML = `
          <span class="success">
            發放完成<br>
            新增：${result.addedCount} 筆<br>
            已完成略過：${result.skippedCount} 筆
          </span>
        `;
      } catch (error) {
        msg.innerHTML = `<span class="error">${error.message || error}</span>`;
      }
    }

    init();
  </script>
</body>
</html>
