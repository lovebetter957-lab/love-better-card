<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOVE BETTER 會員集點卡</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --pink: #ed5e9d;
      --pink-dark: #d7498b;
      --pink-soft: #f8c6d9;
      --pink-pale: #fff3f8;
      --ink: #32272c;
      --muted: #83727a;
      --line: #f2d7e2;
      --white: #ffffff;
      --green: #45a865;
      --danger: #c63855;
      --shadow: 0 16px 38px rgba(153, 58, 103, 0.16);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      background: #f6a5c5;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Arial, "Noto Sans TC", "PingFang TC", sans-serif;
      background:
        radial-gradient(circle at 16% 6%, rgba(255,255,255,0.38), transparent 22%),
        radial-gradient(circle at 94% 20%, rgba(255,255,255,0.24), transparent 26%),
        linear-gradient(180deg, #f7bfd4 0%, #ef83b2 52%, #f5a5c4 100%);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    /* =====================================================
       首頁封面：使用 GitHub assets/6月29日(3)-2.gif
    ===================================================== */
    .login-cover {
      position: fixed;
      inset: 0;
      z-index: 99999;
      overflow-y: auto;
      background: #f59abc;
      -webkit-overflow-scrolling: touch;
    }

    .login-cover.is-hidden {
      display: none;
    }

    .login-cover-frame {
      position: relative;
      isolation: isolate;
      width: min(100%, 460px);
      min-height: 100dvh;
      margin: 0 auto;
    }

    .login-cover-image {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* 覆蓋 GIF 裡舊 LOGO 的新版橫式 LOGO */
    .login-cover-logo-wrap {
      position: absolute;
      z-index: 8;
      top: 3.5%;
      left: 4.8%;
      width: 31%;
      padding: 7px 9px;
      border-radius: 12px;
      background: rgba(239, 123, 169, 0.18);
      backdrop-filter: blur(2px);
      pointer-events: none;
    }

    .login-cover-logo {
      display: block;
      width: 100%;
      height: auto;
      filter: brightness(0) invert(1);
      opacity: 0.96;
    }

    /* 按鈕範圍刻意放大，手機不用精準點在字上 */
    .login-cover-button {
      position: absolute;
      z-index: 20;
      top: 75%;
      width: 46%;
      height: 8.5%;
      margin: 0;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    .login-cover-button.member {
      left: 1.7%;
    }

    .login-cover-button.staff {
      right: 1.7%;
    }

    .login-cover.is-entering .login-cover-button {
      pointer-events: none;
    }

    .login-cover-loading {
      position: absolute;
      z-index: 30;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(245, 154, 188, 0.16);
      backdrop-filter: blur(1px);
      pointer-events: all;
    }

    .login-cover.is-entering .login-cover-loading {
      display: grid;
    }

    .login-cover-loading-box {
      display: grid;
      justify-items: center;
      gap: 10px;
      padding: 18px 22px;
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      border-radius: 18px;
      background: rgba(91, 42, 63, 0.55);
      box-shadow: 0 12px 32px rgba(80, 33, 52, 0.24);
    }

    .login-cover-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.36);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    .login-cover-button:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 4px;
    }

    /* =====================================================
       網站內容
    ===================================================== */
    .app-shell {
      width: min(100%, 480px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 14px 48px;
      position: relative;
      overflow: hidden;
    }

    .app-shell::before,
    .app-shell::after {
      content: "";
      position: fixed;
      z-index: -1;
      opacity: 0.28;
      pointer-events: none;
    }

    .app-shell::before {
      width: 360px;
      height: 360px;
      top: -140px;
      right: -150px;
      border: 42px solid rgba(255,255,255,0.34);
      border-radius: 52% 48% 46% 54%;
      transform: rotate(24deg);
    }

    .app-shell::after {
      width: 390px;
      height: 190px;
      bottom: -70px;
      left: -90px;
      border-radius: 50%;
      background: rgba(255,255,255,0.17);
      transform: rotate(-12deg);
    }

    .surface {
      border: 1px solid rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.96);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .loading-card,
    .register-card,
    .staff-card {
      padding: 22px;
      margin-bottom: 14px;
    }

    .loader {
      width: 34px;
      height: 34px;
      border: 4px solid #f8c8da;
      border-top-color: var(--pink);
      border-radius: 50%;
      animation: spin 0.72s linear infinite;
      margin-bottom: 14px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .title {
      margin: 0 0 8px;
      font-size: 23px;
      line-height: 1.25;
      font-weight: 950;
      color: var(--ink);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    .error {
      color: var(--danger);
      font-weight: 800;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .success {
      color: #257a44;
      font-weight: 850;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* 註冊 */
    .register-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .mini-brand {
      color: var(--pink-dark);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .field {
      margin-top: 15px;
    }

    .field-label {
      margin-bottom: 7px;
      color: #6d5961;
      font-size: 13px;
      font-weight: 900;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #ebd5df;
      border-radius: 16px;
      outline: none;
      background: #fff;
      color: var(--ink);
      padding: 14px;
      transition: 0.18s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #ed76aa;
      box-shadow: 0 0 0 4px rgba(237,94,157,0.14);
    }

    textarea {
      min-height: 94px;
      resize: vertical;
    }

    .birthday-grid {
      display: grid;
      grid-template-columns: 1.35fr 1fr 1fr;
      gap: 8px;
    }

    .btn {
      width: 100%;
      min-height: 52px;
      margin-top: 14px;
      padding: 13px 16px;
      border: 0;
      border-radius: 18px;
      font-weight: 950;
      transition: transform 0.16s ease, opacity 0.16s ease;
    }

    .btn:active {
      transform: scale(0.985);
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, #f066a4, #d84689);
      box-shadow: 0 10px 20px rgba(214,70,136,0.26);
    }

    .btn-soft {
      color: #8d3e64;
      background: #fff2f7;
      border: 1px solid #f3c2d6;
    }

    .btn-dark {
      color: #fff;
      background: linear-gradient(135deg, #563b49, #2f252b);
    }

    .small {
      margin-top: 9px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* =====================================================
       會員集點卡頁
    ===================================================== */
    .member-card {
      overflow: hidden;
      margin-bottom: 14px;
      padding: 19px;
      position: relative;
    }

    .member-card::before {
      content: "";
      position: absolute;
      width: 270px;
      height: 270px;
      top: -136px;
      right: -124px;
      border-radius: 50%;
      background: rgba(246, 163, 195, 0.17);
    }

    .member-card > * {
      position: relative;
      z-index: 1;
    }

    .member-brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .member-brand {
      display: flex;
      align-items: center;
      min-height: 28px;
    }

    .member-brand-logo {
      display: block;
      width: 126px;
      height: auto;
      opacity: 0.76;
    }

    .gender-mark {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 1.5px solid #a0a0a0;
      border-radius: 50%;
      color: #8d8d8d;
      font-weight: 900;
      font-size: 16px;
    }

    .member-greeting {
      margin-top: 18px;
      color: #6f656a;
      font-size: 18px;
      font-weight: 850;
    }

    .member-progress {
      margin-top: 2px;
      color: #847d81;
      font-size: 48px;
      font-weight: 950;
      line-height: 1;
      letter-spacing: -1.8px;
    }

    .member-progress span {
      font-size: 27px;
      letter-spacing: -0.5px;
    }

    .progress-note {
      margin-top: 13px;
      color: #897d83;
      font-size: 13px;
      line-height: 1.5;
    }

    .route-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      color: var(--pink);
      font-size: 12px;
      font-weight: 950;
      letter-spacing: 0.7px;
    }

    .route-labels strong {
      display: block;
      margin-top: 2px;
      font-size: 22px;
      line-height: 1;
      letter-spacing: 0;
    }

    .route-labels .to {
      text-align: right;
    }

    .route-line {
      width: 100%;
      height: 10px;
      overflow: hidden;
      margin-top: 9px;
      border-radius: 999px;
      background: #efefef;
      border: 1px solid #f3d1df;
    }

    .route-fill {
      width: 0%;
      height: 100%;
      min-width: 11px;
      border-radius: 999px;
      background: linear-gradient(90deg, #f2a0c2, #ea5d9a);
      transition: width 0.35s ease;
    }

    .mission-board {
      padding: 18px 14px 14px;
      margin-bottom: 14px;
    }

    .mission-board-title {
      margin: 0 0 14px;
      color: #6e696c;
      font-size: 22px;
      font-weight: 950;
    }

    .category-card {
      margin: 12px 0;
      padding: 14px;
      border: 1px solid #f4d9e4;
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 7px 17px rgba(221,100,153,0.08);
    }

    .category-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 11px;
      color: var(--pink);
      font-size: 16px;
      font-weight: 950;
    }

    .category-title::before {
      content: "";
      width: 5px;
      height: 18px;
      border-radius: 999px;
      background: var(--pink);
    }

    .mission-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 8px 0;
      padding: 7px 8px 7px 5px;
      border: 1px solid #f4e6eb;
      border-radius: 999px;
      background: #fff;
      text-align: left;
    }

    .mission-row.is-link {
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .mission-row.is-link:active {
      transform: scale(0.987);
    }

    .mission-row.done {
      border-color: #f4abc9;
      background: #fff4f8;
    }

    .mission-left {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
      flex: 1;
    }

    .mission-dot {
      width: 25px;
      height: 25px;
      flex: 0 0 25px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #d4d4d6;
      color: #fff;
      font-size: 13px;
      font-weight: 950;
    }

    .mission-row.done .mission-dot {
      background: var(--pink);
    }

    .mission-name {
      min-width: 0;
      color: #3e3439;
      font-size: 14px;
      font-weight: 850;
      line-height: 1.4;
      word-break: break-word;
    }

    .mission-status {
      min-width: 72px;
      padding: 7px 9px;
      border-radius: 999px;
      color: #8b8b8b;
      background: #d5d5d7;
      font-size: 11px;
      font-weight: 900;
      text-align: center;
      white-space: nowrap;
    }

    .mission-row.done .mission-status {
      color: #fff;
      background: var(--pink);
    }

    .mission-row.is-link:not(.done) .mission-status {
      color: #fff;
      background: #df85ac;
    }

    /* 工作人員 */
    .staff-entry {
      padding: 14px;
      text-align: center;
    }

    .staff-panel {
      margin-top: 14px;
      padding: 20px;
    }

    .staff-panel .section-title {
      margin: 0 0 7px;
      font-size: 21px;
      font-weight: 950;
      color: var(--ink);
    }

    .divider {
      height: 1px;
      margin: 20px 0;
      background: #f0dce5;
    }

    @media (max-width: 360px) {
      .app-shell {
        padding: 14px 10px 36px;
      }

      .member-progress {
        font-size: 42px;
      }

      .mission-name {
        font-size: 13px;
      }

      .mission-status {
        min-width: 66px;
        padding-inline: 7px;
      }
    }
  </style>
</head>

<body>
  <!-- 首頁封面 -->
  <div id="loginCover" class="login-cover">
    <div class="login-cover-frame">
      <img
        class="login-cover-image"
        src="./assets/6月29日(3)-2.gif"
        alt="LOVE BETTER 關係探索旅程"
      >

      <div class="login-cover-logo-wrap" aria-hidden="true">
        <img
          class="login-cover-logo"
          src="./assets/lovebetter-logo-horizontal.png"
          alt=""
        >
      </div>

      <button
        class="login-cover-button member"
        type="button"
        onclick="enterMemberJourney()"
        aria-label="會員登入"
      ></button>

      <button
        class="login-cover-button staff"
        type="button"
        onclick="enterStaffJourney()"
        aria-label="工作人員登入"
      ></button>

      <div class="login-cover-loading" aria-live="polite">
        <div class="login-cover-loading-box">
          <div class="login-cover-spinner"></div>
          <div id="loginCoverLoadingText">正在開啟你的探索旅程…</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 系統內容 -->
  <main class="app-shell">
    <section id="loading" class="surface loading-card">
      <div class="loader"></div>
      <h1 class="title">正在載入</h1>
      <p class="subtitle">系統正在讀取你的 LINE 會員資料。</p>
    </section>

    <section id="registerView" class="surface register-card hidden">
      <div class="register-top">
        <div>
          <div class="mini-brand">LOVE BETTER JOURNEY</div>
          <h1 class="title">開啟探索旅程</h1>
        </div>
      </div>

      <p class="subtitle">
        建立會員後即自動獲得「會員建檔註冊」1 點，正式開始累積你的日本旅程。
      </p>

      <div class="field">
        <div class="field-label">真實姓名</div>
        <input id="name" placeholder="請輸入姓名">
      </div>

      <div class="field">
        <div class="field-label">手機號碼</div>
        <input id="phone" placeholder="請輸入手機號碼，例如 0912345678" inputmode="tel">
      </div>

      <div class="field">
        <div class="field-label">出生年月日</div>
        <div class="birthday-grid">
          <select id="birthYear">
            <option value="">年份</option>
          </select>
          <select id="birthMonth">
            <option value="">月份</option>
          </select>
          <select id="birthDay">
            <option value="">日期</option>
          </select>
        </div>
      </div>

      <div class="field">
        <div class="field-label">性別</div>
        <select id="gender">
          <option value="">請選擇性別</option>
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
      </div>

      <button class="btn btn-primary" type="button" onclick="submitRegister()">
        建立會員並獲得 1 點
      </button>

      <div id="registerMsg" class="small"></div>
    </section>

    <section id="memberView" class="hidden"></section>

    <section class="surface staff-entry">
      <button class="btn btn-soft" type="button" onclick="openStaffPanel()">
        工作人員模式
      </button>
      <div id="staffView" class="hidden staff-panel"></div>
    </section>
  </main>

  <script>
    const LIFF_ID = "2010212550-s957LSzk";

    let ACCESS_TOKEN = "";
    let MY_CARD = null;
    let STAFF_DATA = null;

    function setLoading(message) {
      const loading = document.getElementById("loading");
      loading.classList.remove("hidden");
      loading.innerHTML = `
        <div class="loader"></div>
        <h1 class="title">處理中</h1>
        <p class="subtitle">${escapeHtml(message)}</p>
      `;
    }

    function showError(message) {
      const loading = document.getElementById("loading");
      loading.classList.remove("hidden");
      loading.innerHTML = `
        <h1 class="title">系統錯誤</h1>
        <div class="error">${escapeHtml(message)}</div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeJsString(value) {
      return String(value ?? "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/\r?\n/g, "");
    }

    function pad2(num) {
      return String(num).padStart(2, "0");
    }

    function populateBirthdayOptions() {
      const yearSelect = document.getElementById("birthYear");
      const monthSelect = document.getElementById("birthMonth");
      const daySelect = document.getElementById("birthDay");

      if (!yearSelect || yearSelect.dataset.ready === "true") return;
      yearSelect.dataset.ready = "true";

      const currentYear = new Date().getFullYear();

      for (let year = currentYear; year >= 1950; year--) {
        const option = document.createElement("option");
        option.value = year;
        option.textContent = year + "年";
        yearSelect.appendChild(option);
      }

      for (let month = 1; month <= 12; month++) {
        const option = document.createElement("option");
        option.value = pad2(month);
        option.textContent = month + "月";
        monthSelect.appendChild(option);
      }

      function renderDays() {
        const previousDay = daySelect.value;
        const year = Number(yearSelect.value);
        const month = Number(monthSelect.value);

        daySelect.innerHTML = '<option value="">日期</option>';

        if (!year || !month) return;

        const totalDays = new Date(year, month, 0).getDate();

        for (let day = 1; day <= totalDays; day++) {
          const option = document.createElement("option");
          option.value = pad2(day);
          option.textContent = day + "日";
          daySelect.appendChild(option);
        }

        if (previousDay && Number(previousDay) <= totalDays) {
          daySelect.value = previousDay;
        }
      }

      yearSelect.addEventListener("change", renderDays);
      monthSelect.addEventListener("change", renderDays);
    }

    async function api(action, payload = {}) {
      const response = await fetch("/api/gas", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          action: action,
          accessToken: ACCESS_TOKEN,
          payload: payload
        })
      });

      const result = await response.json();

      if (!result.ok) {
        throw new Error(result.error || "API 發生錯誤");
      }

      return result.data;
    }

    async function init() {
      try {
        populateBirthdayOptions();
        setLoading("正在初始化 LINE 會員身分...");

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          setLoading("尚未登入 LINE，正在導向登入...");
          liff.login();
          return;
        }

        ACCESS_TOKEN = liff.getAccessToken();

        if (!ACCESS_TOKEN) {
          throw new Error("抓不到 LINE Access Token");
        }

        setLoading("已取得 LINE 身分，正在讀取會員資料...");
        MY_CARD = await api("getMyCard");

        document.getElementById("loading").classList.add("hidden");

        if (!MY_CARD.registered) {
          document.getElementById("registerView").classList.remove("hidden");
          return;
        }

        renderMemberCard(MY_CARD);
      } catch (error) {
        showError(error && error.message ? error.message : error);
      }
    }

    async function submitRegister() {
      const msg = document.getElementById("registerMsg");
      msg.textContent = "送出中...";

      const year = document.getElementById("birthYear").value;
      const month = document.getElementById("birthMonth").value;
      const day = document.getElementById("birthDay").value;

      const form = {
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        birthday: year && month && day ? `${year}-${month}-${day}` : "",
        gender: document.getElementById("gender").value
      };

      if (!form.name || !form.phone || !form.gender) {
        msg.innerHTML = '<span class="error">姓名、手機、性別為必填欄位</span>';
        return;
      }

      try {
        MY_CARD = await api("registerMember", form);
        document.getElementById("registerView").classList.add("hidden");
        renderMemberCard(MY_CARD);
      } catch (error) {
        msg.innerHTML = `<span class="error">${escapeHtml(error && error.message ? error.message : error)}</span>`;
      }
    }

    function getGenderSymbol(gender) {
      return gender === "女" ? "♀" : "♂";
    }

    function getMissionStatus(task) {
      if (task.completed) return "已完成";
      if (task.taskUrl) return task.buttonText || "前往解鎖";
      return "未完成";
    }

    function getDisplayMemberName(data) {
      const profile = data && data.profile ? data.profile : {};
      const member = data && data.member ? data.member : {};

      const candidates = [
        profile.lineName,
        profile.displayName,
        member.lineName,
        member.name
      ];

      for (let i = 0; i < candidates.length; i++) {
        const value = String(candidates[i] || "").trim();
        if (value) return value;
      }

      return "LINE好友會員";
    }

    function getProgressNote(remaining) {
      const points = Math.max(Number(remaining || 0), 0);

      if (points <= 0) {
        return "恭喜你已完成探索體驗，已取得日本來回機票資格";
      }

      return "探索體驗還差 " + points + " 點，即可獲得日本來回機票";
    }

    function renderMemberCard(data) {
      const view = document.getElementById("memberView");
      view.classList.remove("hidden");

      const total = Number(data.totalPoints || 25);
      const completed = Number(data.completedPoints || 0);
      const remaining = Math.max(total - completed, 0);
      const percent = total > 0 ? Math.min(100, Math.round((completed / total) * 100)) : 0;

      const grouped = {};
      data.tasks.forEach(function(task) {
        if (!grouped[task.category]) grouped[task.category] = [];
        grouped[task.category].push(task);
      });

      let taskHtml = "";

      Object.keys(grouped).forEach(function(category) {
        taskHtml += `
          <section class="category-card">
            <h3 class="category-title">${escapeHtml(category)}</h3>
        `;

        grouped[category].forEach(function(task) {
          const doneClass = task.completed ? "done" : "";
          const linkClass = task.taskUrl && !task.completed ? "is-link" : "";
          const onClick = task.taskUrl && !task.completed
            ? `onclick="openTaskUrl('${escapeJsString(task.taskUrl)}')"`
            : "";

          taskHtml += `
            <button
              class="mission-row ${doneClass} ${linkClass}"
              type="button"
              ${onClick}
              ${task.taskUrl && !task.completed ? "" : "disabled"}
            >
              <span class="mission-left">
                <span class="mission-dot">${task.completed ? "✓" : ""}</span>
                <span class="mission-name">${escapeHtml(task.taskName)}</span>
              </span>
              <span class="mission-status">${escapeHtml(getMissionStatus(task))}</span>
            </button>
          `;
        });

        taskHtml += `</section>`;
      });

      view.innerHTML = `
        <section class="surface member-card">
          <div class="member-brand-row">
            <div class="member-brand">
              <img
                class="member-brand-logo"
                src="./assets/lovebetter-logo-horizontal.png"
                alt="Love Better 戀愛好多"
              >
            </div>
            <span class="gender-mark">${getGenderSymbol(data.member.gender)}</span>
          </div>

          <div class="member-greeting">${escapeHtml(getDisplayMemberName(data))}</div>

          <div class="member-progress">
            ${completed}<span>/${total}</span>
          </div>

          <div class="progress-note">
            ${escapeHtml(getProgressNote(remaining))}
          </div>

          <div class="route-labels">
            <div>
              TAIWAN
              <strong>台灣</strong>
            </div>
            <div class="to">
              JAPAN
              <strong>日本</strong>
            </div>
          </div>

          <div class="route-line">
            <div class="route-fill" style="width:${percent}%"></div>
          </div>
        </section>

        <section class="surface mission-board">
          <h2 class="mission-board-title">任務完成狀態</h2>
          ${taskHtml}
        </section>
      `;
    }

    function openTaskUrl(url) {
      if (!url) return;

      try {
        if (window.liff && liff.isInClient()) {
          liff.openWindow({
            url: url,
            external: true
          });
          return;
        }
      } catch (error) {}

      window.open(url, "_blank", "noopener");
    }

    async function openStaffPanel() {
      const staffView = document.getElementById("staffView");
      staffView.classList.remove("hidden");
      staffView.innerHTML = '<div class="small">工作人員資料讀取中...</div>';

      try {
        if (!ACCESS_TOKEN) {
          throw new Error("系統尚未完成 LINE 身分初始化，請稍候後再按一次");
        }

        STAFF_DATA = await api("getStaffPanelData");
        renderStaffPanel();
      } catch (error) {
        staffView.innerHTML = `<div class="error">${escapeHtml(error && error.message ? error.message : error)}</div>`;
      }
    }

    function renderStaffPanel() {
      const staffView = document.getElementById("staffView");

      const taskOptions = STAFF_DATA.tasks.map(function(task) {
        return `<option value="${escapeHtml(task.taskId)}">${escapeHtml(task.gender)}｜${escapeHtml(task.category)}｜${escapeHtml(task.taskName)}</option>`;
      }).join("");

      staffView.innerHTML = `
        <h2 class="section-title">工作人員發放任務</h2>
        <p class="subtitle">輸入會員手機號碼，選擇完成任務即可發放點數與 LINE 圖卡通知。</p>

        <div class="field">
          <div class="field-label">會員手機號碼</div>
          <input id="singlePhone" placeholder="例如 0912345678" inputmode="tel">
        </div>

        <div class="field">
          <div class="field-label">完成任務</div>
          <select id="singleTaskId">${taskOptions}</select>
        </div>

        <div class="field">
          <div class="field-label">備註</div>
          <textarea id="singleNote" placeholder="例如：活動完成、預約完成"></textarea>
        </div>

        <button class="btn btn-dark" type="button" onclick="grantSingle()">確認發放點數</button>
        <div id="singleMsg" class="small"></div>

        <div class="divider"></div>

        <h2 class="section-title">集體發放</h2>

        <div class="field">
          <div class="field-label">發放模式</div>
          <select id="bulkMode">
            <option value="all">全部會員</option>
            <option value="gender">依性別發放</option>
            <option value="ids">貼上會員 ID 批量發放</option>
          </select>
        </div>

        <div class="field">
          <div class="field-label">性別篩選</div>
          <select id="bulkGender">
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
        </div>

        <div class="field">
          <div class="field-label">會員 ID 批量輸入</div>
          <textarea id="bulkMemberIds" placeholder="例如 LOVE0001、LOVE0002，可用逗號或換行分隔"></textarea>
        </div>

        <div class="field">
          <div class="field-label">完成任務</div>
          <select id="bulkTaskId">${taskOptions}</select>
        </div>

        <div class="field">
          <div class="field-label">備註</div>
          <textarea id="bulkNote" placeholder="例如：年度活動集體完成"></textarea>
        </div>

        <button class="btn btn-dark" type="button" onclick="grantBulk()">集體發放點數</button>
        <div id="bulkMsg" class="small"></div>
      `;
    }

    async function grantSingle() {
      const msg = document.getElementById("singleMsg");
      msg.textContent = "發放中...";

      try {
        const result = await api("grantTaskToMember", {
          memberId: document.getElementById("singlePhone").value.trim(),
          taskId: document.getElementById("singleTaskId").value,
          note: document.getElementById("singleNote").value.trim()
        });

        msg.innerHTML = `<span class="success">${escapeHtml(result.message)}</span>`;
      } catch (error) {
        msg.innerHTML = `<span class="error">${escapeHtml(error && error.message ? error.message : error)}</span>`;
      }
    }

    async function grantBulk() {
      const msg = document.getElementById("bulkMsg");
      msg.textContent = "集體發放中...";

      try {
        const result = await api("bulkGrantTask", {
          mode: document.getElementById("bulkMode").value,
          gender: document.getElementById("bulkGender").value,
          memberIds: document.getElementById("bulkMemberIds").value,
          taskId: document.getElementById("bulkTaskId").value,
          note: document.getElementById("bulkNote").value.trim()
        });

        msg.innerHTML = `
          <span class="success">
            發放完成<br>
            新增點數：${result.addedCount} 筆<br>
            已完成略過：${result.skippedCount} 筆<br>
            LINE 圖卡已送出：${result.pushSuccessCount} 筆<br>
            LINE 圖卡失敗：${result.pushFailCount} 筆
          </span>
        `;
      } catch (error) {
        msg.innerHTML = `<span class="error">${escapeHtml(error && error.message ? error.message : error)}</span>`;
      }
    }

    let COVER_ENTERING = false;

    function setLoginCoverLoadingText(text) {
      const target = document.getElementById("loginCoverLoadingText");
      if (target) target.textContent = text;
    }

    function closeLoginCover() {
      const cover = document.getElementById("loginCover");

      if (cover) {
        cover.classList.add("is-hidden");
      }
    }

    function beginCoverEntry(text) {
      if (COVER_ENTERING) return false;

      COVER_ENTERING = true;

      const cover = document.getElementById("loginCover");
      if (cover) {
        cover.classList.add("is-entering");
      }

      setLoginCoverLoadingText(text);
      return true;
    }

    function enterMemberJourney() {
      if (!beginCoverEntry("正在開啟你的探索旅程…")) return;

      setTimeout(function() {
        closeLoginCover();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, 180);
    }

    function enterStaffJourney() {
      if (!beginCoverEntry("正在確認工作人員身分…")) return;

      setTimeout(function() {
        closeLoginCover();

        const startedAt = Date.now();
        const timer = setInterval(function() {
          if (ACCESS_TOKEN || Date.now() - startedAt > 6000) {
            clearInterval(timer);
            openStaffPanel();
          }
        }, 120);
      }, 180);
    }

    init();
  </script>
</body>
</html>
