<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOVE BETTER 會員集點卡</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --bg: #f4eee8;
      --bg-soft: #fbf7f2;
      --deep: #211b18;
      --deep-2: #3c2f29;
      --gold: #b9966d;
      --gold-2: #d9c29b;
      --brown: #8d6a52;
      --text: #2b2522;
      --muted: #7d7169;
      --line: rgba(95, 76, 62, 0.12);
      --white: rgba(255, 255, 255, 0.92);
      --green: #3f8f55;
      --red: #c43b35;
      --shadow: 0 18px 45px rgba(54, 38, 29, 0.13);
      --radius-lg: 28px;
      --radius-md: 20px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(217, 194, 155, 0.42), transparent 34%),
        radial-gradient(circle at top right, rgba(60, 47, 41, 0.18), transparent 30%),
        linear-gradient(180deg, #f8f0e8 0%, #f0e8df 42%, #ece2d8 100%);
      color: var(--text);
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 18px 14px 44px;
    }

    .brand-hero {
      position: relative;
      overflow: hidden;
      padding: 28px 22px;
      border-radius: 32px;
      background:
        linear-gradient(135deg, rgba(33, 27, 24, 0.98), rgba(62, 47, 39, 0.96)),
        radial-gradient(circle at top right, rgba(217, 194, 155, 0.3), transparent 38%);
      color: #fff;
      box-shadow: 0 22px 55px rgba(33, 27, 24, 0.26);
      margin-bottom: 16px;
    }

    .brand-hero::before {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      right: -64px;
      top: -64px;
      border-radius: 999px;
      border: 1px solid rgba(217, 194, 155, 0.34);
      background: rgba(217, 194, 155, 0.06);
    }

    .brand-hero::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      left: -55px;
      bottom: -55px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
    }

    .brand-label {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(217, 194, 155, 0.28);
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 18px;
    }

    .brand-title {
      position: relative;
      z-index: 1;
      font-size: 34px;
      line-height: 1.05;
      font-weight: 950;
      letter-spacing: 0.3px;
      margin: 0 0 10px;
    }

    .brand-subtitle {
      position: relative;
      z-index: 1;
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
      line-height: 1.75;
      margin: 0;
    }

    .reward-strip {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      margin-top: 22px;
      padding: 14px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(217, 194, 155, 0.25);
    }

    .reward-title {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.66);
      margin-bottom: 5px;
    }

    .reward-main {
      font-size: 17px;
      font-weight: 950;
      color: #fff;
    }

    .reward-badge {
      padding: 9px 11px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      color: #211b18;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
    }

    .card {
      border-radius: var(--radius-lg);
      padding: 20px;
      background: var(--white);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.68);
      backdrop-filter: blur(16px);
      margin-bottom: 14px;
    }

    .card-flat {
      box-shadow: 0 10px 30px rgba(54, 38, 29, 0.08);
    }

    .title {
      font-size: 24px;
      font-weight: 950;
      color: var(--deep);
      margin: 0 0 8px;
      letter-spacing: -0.2px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 950;
      color: var(--deep);
      margin: 0 0 12px;
    }

    .subtitle {
      font-size: 14px;
      line-height: 1.75;
      color: var(--muted);
      margin: 0;
      word-break: break-word;
    }

    .hidden {
      display: none !important;
    }

    .field {
      margin-top: 15px;
    }

    .field-label {
      font-size: 13px;
      font-weight: 900;
      color: #5c5049;
      margin-bottom: 7px;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      font-size: 16px;
      font-family: inherit;
      border-radius: 17px;
      outline: none;
    }

    input,
    select,
    textarea {
      border: 1px solid rgba(115, 93, 77, 0.16);
      background: #fff;
      color: var(--text);
      padding: 14px 14px;
      transition: 0.2s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(185, 150, 109, 0.8);
      box-shadow: 0 0 0 5px rgba(185, 150, 109, 0.12);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.5;
    }

    .birthday-grid {
      display: grid;
      grid-template-columns: 1.35fr 1fr 1fr;
      gap: 9px;
    }

    .btn {
      border: 0;
      cursor: pointer;
      font-weight: 950;
      padding: 15px 16px;
      margin-top: 14px;
      transition: 0.18s ease;
      letter-spacing: 0.2px;
    }

    .btn:active {
      transform: scale(0.985);
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--deep) 0%, var(--deep-2) 100%);
      box-shadow: 0 12px 24px rgba(33, 27, 24, 0.18);
    }

    .btn-secondary {
      color: #fff;
      background: linear-gradient(135deg, var(--brown) 0%, #6d4e3d 100%);
      box-shadow: 0 10px 22px rgba(109, 78, 61, 0.15);
    }

    .btn-light {
      color: var(--deep);
      background: #f6efe9;
      border: 1px solid rgba(115, 93, 77, 0.14);
      box-shadow: none;
    }

    .loading-card {
      text-align: left;
    }

    .loader {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 3px solid rgba(185, 150, 109, 0.2);
      border-top-color: var(--gold);
      animation: spin 0.8s linear infinite;
      margin-bottom: 14px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .member-card {
      position: relative;
      overflow: hidden;
      color: #fff;
      background:
        radial-gradient(circle at top right, rgba(217, 194, 155, 0.32), transparent 36%),
        linear-gradient(135deg, #211b18 0%, #3d3029 100%);
    }

    .member-card::after {
      content: "";
      position: absolute;
      width: 155px;
      height: 155px;
      right: -70px;
      bottom: -70px;
      border-radius: 50%;
      border: 1px solid rgba(217, 194, 155, 0.23);
      background: rgba(255, 255, 255, 0.035);
    }

    .member-top {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 18px;
    }

    .member-label {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1.2px;
      color: rgba(255, 255, 255, 0.58);
      margin-bottom: 7px;
    }

    .member-name {
      font-size: 25px;
      font-weight: 950;
      color: #fff;
      line-height: 1.2;
    }

    .member-pill {
      flex-shrink: 0;
      padding: 8px 10px;
      border-radius: 999px;
      color: #241d19;
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      font-size: 12px;
      font-weight: 950;
    }

    .progress-row {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: end;
      margin-bottom: 12px;
    }

    .progress-number {
      font-size: 44px;
      line-height: 1;
      font-weight: 950;
      color: #fff;
      letter-spacing: -1px;
    }

    .progress-copy {
      text-align: right;
      color: rgba(255, 255, 255, 0.74);
      line-height: 1.55;
      font-size: 13px;
      white-space: nowrap;
    }

    .bar {
      position: relative;
      z-index: 1;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.13);
      margin: 12px 0 14px;
    }

    .bar-inner {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--gold), #fff1bd);
      width: 0%;
    }

    .member-meta {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .meta-item {
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .meta-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 5px;
    }

    .meta-value {
      font-size: 13px;
      font-weight: 850;
      color: rgba(255, 255, 255, 0.92);
      word-break: break-word;
    }

    .task-category {
      font-size: 16px;
      font-weight: 950;
      color: var(--deep);
      margin-top: 20px;
      margin-bottom: 9px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .task-category::before {
      content: "";
      width: 7px;
      height: 17px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--gold), var(--brown));
      display: inline-block;
    }

    .task {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px;
      border-radius: 19px;
      background: #fbf8f5;
      border: 1px solid rgba(115, 93, 77, 0.09);
      margin: 8px 0;
    }

    .task.done {
      background: linear-gradient(135deg, #eef8f1, #f7fbf8);
      border-color: rgba(63, 143, 85, 0.16);
    }

    .task-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .task-icon {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: #eadfd6;
      color: var(--brown);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 950;
      flex-shrink: 0;
    }

    .task.done .task-icon {
      background: var(--green);
      color: #fff;
    }

    .task-name {
      font-size: 14px;
      line-height: 1.45;
      font-weight: 760;
      color: var(--text);
      word-break: break-word;
    }

    .badge {
      flex-shrink: 0;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e9ded5;
      color: #6e5b50;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
    }

    .task.done .badge {
      background: var(--green);
      color: #fff;
    }

    .staff-panel {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .small {
      margin-top: 9px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .error {
      color: var(--red);
      font-weight: 850;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.65;
    }

    .success {
      color: var(--green);
      font-weight: 850;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.65;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 18px 0;
    }

    @media (max-width: 430px) {
      .page {
        padding: 14px 12px 36px;
      }

      .brand-hero {
        padding: 24px 18px;
        border-radius: 28px;
      }

      .brand-title {
        font-size: 31px;
      }

      .reward-strip {
        grid-template-columns: 1fr;
      }

      .reward-badge {
        width: fit-content;
      }

      .progress-row {
        grid-template-columns: 1fr;
      }

      .progress-copy {
        text-align: left;
      }

      .member-meta {
        grid-template-columns: 1fr;
      }

      .birthday-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="brand-hero">
      <div class="brand-label">LOVE BETTER JOURNEY</div>
      <h1 class="brand-title">關係探索旅程</h1>
      <p class="brand-subtitle">
        新的相遇，新的自己，新的可能。<br>
        透過任務累積點數，完成本次旅程資格。
      </p>

      <div class="reward-strip">
        <div>
          <div class="reward-title">本次會員任務獎勵</div>
          <div class="reward-main">完成 23 點任務，即可獲得日本機票資格</div>
        </div>
        <div class="reward-badge">23 POINTS</div>
      </div>
    </section>

    <section id="loading" class="card loading-card">
      <div class="loader"></div>
      <div class="title">正在載入</div>
      <p class="subtitle">系統正在讀取你的 LINE 會員資料。</p>
    </section>

    <section id="registerView" class="card hidden">
      <div class="title">開啟我的探索旅程</div>
      <p class="subtitle">
        完成會員建檔後，即可開始累積任務點數。資料將用於會員身份綁定與點數紀錄。
      </p>

      <div class="field">
        <div class="field-label">真實姓名</div>
        <input id="name" placeholder="請輸入姓名" />
      </div>

      <div class="field">
        <div class="field-label">手機號碼</div>
        <input id="phone" placeholder="請輸入手機號碼，例如 0912345678" inputmode="tel" />
      </div>

      <div class="field">
        <div class="field-label">出生年月日</div>
        <div class="birthday-grid">
          <select id="birthYear">
            <option value="">年份</option>
          </select>
          <select id="birthMonth">
            <option value="">月份</option>
          </select>
          <select id="birthDay">
            <option value="">日期</option>
          </select>
        </div>
      </div>

      <div class="field">
        <div class="field-label">性別</div>
        <select id="gender">
          <option value="">請選擇性別</option>
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
      </div>

      <button class="btn btn-primary" onclick="submitRegister()">開啟我的探索旅程</button>
      <div id="registerMsg" class="small"></div>
    </section>

    <section id="memberView" class="hidden"></section>

    <section class="card card-flat">
      <button class="btn btn-light" onclick="openStaffPanel()">工作人員模式</button>
      <div id="staffView" class="hidden staff-panel"></div>
    </section>
  </main>

  <script>
    const LIFF_ID = "2010386909-FX5TZgjO";

    let ACCESS_TOKEN = "";
    let MY_CARD = null;
    let STAFF_DATA = null;

    function setLoading(message) {
      document.getElementById("loading").innerHTML = `
        <div class="loader"></div>
        <div class="title">處理中</div>
        <p class="subtitle">${message}</p>
      `;
    }

    function showError(message) {
      document.getElementById("loading").classList.remove("hidden");
      document.getElementById("loading").innerHTML = `
        <div class="title">系統錯誤</div>
        <div class="error">${message}</div>
      `;
    }

    function pad2(num) {
      return String(num).padStart(2, "0");
    }

    function populateBirthdayOptions() {
      const yearSelect = document.getElementById("birthYear");
      const monthSelect = document.getElementById("birthMonth");
      const daySelect = document.getElementById("birthDay");

      if (!yearSelect || yearSelect.dataset.ready === "true") return;

      yearSelect.dataset.ready = "true";

      const currentYear = new Date().getFullYear();

      for (let y = currentYear; y >= 1950; y--) {
        const option = document.createElement("option");
        option.value = y;
        option.textContent = y + "年";
        yearSelect.appendChild(option);
      }

      for (let m = 1; m <= 12; m++) {
        const option = document.createElement("option");
        option.value = pad2(m);
        option.textContent = m + "月";
        monthSelect.appendChild(option);
      }

      function renderDays() {
        const selectedDay = daySelect.value;
        daySelect.innerHTML = '<option value="">日期</option>';

        const year = parseInt(yearSelect.value, 10);
        const month = parseInt(monthSelect.value, 10);

        if (!year || !month) return;

        const lastDay = new Date(year, month, 0).getDate();

        for (let d = 1; d <= lastDay; d++) {
          const option = document.createElement("option");
          option.value = pad2(d);
          option.textContent = d + "日";
          daySelect.appendChild(option);
        }

        if (selectedDay && Number(selectedDay) <= lastDay) {
          daySelect.value = selectedDay;
        }
      }

      yearSelect.addEventListener("change", renderDays);
      monthSelect.addEventListener("change", renderDays);
    }

    async function api(action, payload = {}) {
      const response = await fetch("/api/gas", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          action,
          accessToken: ACCESS_TOKEN,
          payload
        })
      });

      const result = await response.json();

      if (!result.ok) {
        throw new Error(result.error || "API 發生錯誤");
      }

      return result.data;
    }

    async function init() {
      try {
        populateBirthdayOptions();

        setLoading("正在初始化 LINE 會員身分...");

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          setLoading("尚未登入 LINE，正在導向登入...");
          liff.login();
          return;
        }

        ACCESS_TOKEN = liff.getAccessToken();

        if (!ACCESS_TOKEN) {
          throw new Error("抓不到 LINE Access Token");
        }

        setLoading("已取得 LINE 身分，正在讀取會員資料...");

        MY_CARD = await api("getMyCard");

        document.getElementById("loading").classList.add("hidden");

        if (!MY_CARD.registered) {
          document.getElementById("registerView").classList.remove("hidden");
          return;
        }

        renderMemberCard(MY_CARD);
      } catch (error) {
        showError(error.message || error);
      }
    }

    async function submitRegister() {
      const msg = document.getElementById("registerMsg");
      msg.innerHTML = "送出中...";

      const year = document.getElementById("birthYear").value;
      const month = document.getElementById("birthMonth").value;
      const day = document.getElementById("birthDay").value;

      const form = {
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        birthday: year && month && day ? `${year}-${month}-${day}` : "",
        gender: document.getElementById("gender").value
      };

      if (!form.name || !form.phone || !form.gender) {
        msg.innerHTML = '<span class="error">姓名、手機、性別為必填欄位</span>';
        return;
      }

      try {
        MY_CARD = await api("registerMember", form);
        document.getElementById("registerView").classList.add("hidden");
        renderMemberCard(MY_CARD);
      } catch (error) {
        msg.innerHTML = `<span class="error">${error.message || error}</span>`;
      }
    }

    function renderMemberCard(data) {
      const view = document.getElementById("memberView");
      view.classList.remove("hidden");

      const percent = data.totalPoints > 0
        ? Math.min(100, Math.round((data.completedPoints / data.totalPoints) * 100))
        : 0;

      const grouped = {};
      data.tasks.forEach(task => {
        if (!grouped[task.category]) grouped[task.category] = [];
        grouped[task.category].push(task);
      });

      let taskHtml = "";

      Object.keys(grouped).forEach(category => {
        taskHtml += `<div class="task-category">${category}</div>`;

        grouped[category].forEach(task => {
          taskHtml += `
            <div class="task ${task.completed ? "done" : ""}">
              <div class="task-left">
                <div class="task-icon">${task.completed ? "✓" : "•"}</div>
                <div class="task-name">${task.taskName}</div>
              </div>
              <div class="badge">${task.completed ? "已完成" : "+ " + task.points}</div>
            </div>
          `;
        });
      });

      view.innerHTML = `
        <div class="card member-card">
          <div class="member-top">
            <div>
              <div class="member-label">LOVE BETTER MEMBER</div>
              <div class="member-name">${data.member.name}</div>
            </div>
            <div class="member-pill">${data.member.gender || "會員"}</div>
          </div>

          <div class="progress-row">
            <div class="progress-number">${data.completedPoints} / ${data.totalPoints}</div>
            <div class="progress-copy">
              還差 ${data.remainingPoints} 點<br>
              完成本次日本機票資格
            </div>
          </div>

          <div class="bar">
            <div class="bar-inner" style="width:${percent}%"></div>
          </div>

          <div class="member-meta">
            <div class="meta-item">
              <div class="meta-label">會員編號</div>
              <div class="meta-value">${data.member.memberId}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">LINE 名稱</div>
              <div class="meta-value">${data.profile.lineName || "—"}</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">任務完成狀態</div>
          <p class="subtitle">完成任務後，將由工作人員審核或發放點數。</p>
          ${taskHtml}
        </div>
      `;
    }

    async function openStaffPanel() {
      const staffView = document.getElementById("staffView");
      staffView.classList.remove("hidden");
      staffView.innerHTML = '<div class="small">工作人員資料讀取中...</div>';

      try {
        STAFF_DATA = await api("getStaffPanelData");
        renderStaffPanel();
      } catch (error) {
        staffView.innerHTML = `<div class="error">${error.message || error}</div>`;
      }
    }

    function renderStaffPanel() {
      const staffView = document.getElementById("staffView");

      const taskOptions = STAFF_DATA.tasks.map(task => {
        return `<option value="${task.taskId}">${task.gender}｜${task.category}｜${task.taskName}</option>`;
      }).join("");

      staffView.innerHTML = `
        <div class="section-title">工作人員發放任務</div>
        <p class="subtitle">輸入會員手機號碼，選擇完成任務後即可發放點數。</p>

        <div class="field">
          <div class="field-label">會員手機號碼</div>
          <input id="singlePhone" placeholder="例如 0912345678" inputmode="tel">
        </div>

        <div class="field">
          <div class="field-label">完成任務</div>
          <select id="singleTaskId">${taskOptions}</select>
        </div>

        <div class="field">
          <div class="field-label">備註</div>
          <textarea id="singleNote" placeholder="例如：6/22 精選活動完成"></textarea>
        </div>

        <button class="btn btn-secondary" onclick="grantSingle()">確認發放點數</button>
        <div id="singleMsg" class="small"></div>

        <div class="divider"></div>

        <div class="section-title">集體發放</div>

        <div class="field">
          <div class="field-label">發放模式</div>
          <select id="bulkMode">
            <option value="all">全部會員</option>
            <option value="gender">依性別發放</option>
            <option value="ids">貼上會員 ID 批量發放</option>
          </select>
        </div>

        <div class="field">
          <div class="field-label">性別篩選</div>
          <select id="bulkGender">
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
        </div>

        <div class="field">
          <div class="field-label">會員 ID 批量輸入</div>
          <textarea id="bulkMemberIds" placeholder="若選擇會員 ID 批量發放，請輸入 LOVE0001、LOVE0002，可換行"></textarea>
        </div>

        <div class="field">
          <div class="field-label">完成任務</div>
          <select id="bulkTaskId">${taskOptions}</select>
        </div>

        <div class="field">
          <div class="field-label">備註</div>
          <textarea id="bulkNote" placeholder="例如：6/22 活動集體完成"></textarea>
        </div>

        <button class="btn btn-secondary" onclick="grantBulk()">集體發放點數</button>
        <div id="bulkMsg" class="small"></div>
      `;
    }

    async function grantSingle() {
      const msg = document.getElementById("singleMsg");
      msg.innerHTML = "發放中...";

      try {
        const result = await api("grantTaskToMember", {
          memberId: document.getElementById("singlePhone").value.trim(),
          taskId: document.getElementById("singleTaskId").value,
          note: document.getElementById("singleNote").value.trim()
        });

        msg.innerHTML = `<span class="success">${result.message}</span>`;
      } catch (error) {
        msg.innerHTML = `<span class="error">${error.message || error}</span>`;
      }
    }

    async function grantBulk() {
      const msg = document.getElementById("bulkMsg");
      msg.innerHTML = "集體發放中...";

      try {
        const result = await api("bulkGrantTask", {
          mode: document.getElementById("bulkMode").value,
          gender: document.getElementById("bulkGender").value,
          memberIds: document.getElementById("bulkMemberIds").value,
          taskId: document.getElementById("bulkTaskId").value,
          note: document.getElementById("bulkNote").value.trim()
        });

        msg.innerHTML = `
          <span class="success">
            發放完成<br>
            新增：${result.addedCount} 筆<br>
            已完成略過：${result.skippedCount} 筆
          </span>
        `;
      } catch (error) {
        msg.innerHTML = `<span class="error">${error.message || error}</span>`;
      }
    }

    init();
  </script>
</body>
</html>
